# ===========================================================================
# Workspace
# ===========================================================================
packages:
  - "."
  - "website"

# ===========================================================================
# Security — supply-chain hardening
# ===========================================================================

# Only allow dependencies published at least 7 days ago
minimumReleaseAge: 10080

# Block transitive deps from using git repos or tarball URLs
blockExoticSubdeps: true

# Fail install if a package's trust level dropped vs previous releases
trustPolicy: no-downgrade

# Block ALL postinstall scripts except explicitly allowed
onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver

# ===========================================================================
# Strictness
# ===========================================================================

# Fail on missing/invalid peer deps instead of warning
strictPeerDependencies: true

# Library contributors should explicitly manage peer deps
autoInstallPeers: false
