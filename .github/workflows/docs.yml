name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
        working-directory: website

      # Checkout gh-pages to preserve versioned folders
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-current
        continue-on-error: true

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy
          # Preserve old versioned folders (v0.1/, v0.2/, etc.)
          if [ -d gh-pages-current ]; then
            for dir in gh-pages-current/v*/; do
              [ -d "$dir" ] && cp -r "$dir" deploy/
            done
          fi
          # Copy latest build to root
          cp -r website/out/* deploy/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
