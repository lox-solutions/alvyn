name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm vitest run --coverage

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const t = summary.total;

            const pct = (n) => n.pct.toFixed(2);
            const icon = (n) => n.pct >= 90 ? '✅' : n.pct >= 85 ? '⚠️' : '❌';

            const body = [
              '## Coverage Report',
              '',
              '| Metric | Coverage | Status |',
              '|--------|----------|--------|',
              `| Statements | ${pct(t.statements)}% | ${icon(t.statements)} |`,
              `| Branches | ${pct(t.branches)}% | ${icon(t.branches)} |`,
              `| Functions | ${pct(t.functions)}% | ${icon(t.functions)} |`,
              `| Lines | ${pct(t.lines)}% | ${icon(t.lines)} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
